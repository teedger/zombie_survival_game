//  AUDIO ENGINE  (Web Audio API — fully procedural)
// ══════════════════════════════════════════════════════
let audioCtx=null, masterGain=null, musicGainNode=null, sfxGainNode=null;
let musicOscs=[], soundMuted=false;
const _lastMgunSfx={};

function ensureAudio(){
  if(audioCtx){if(audioCtx.state==='suspended')audioCtx.resume();return true;}
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=1;masterGain.connect(audioCtx.destination);
    musicGainNode=audioCtx.createGain();musicGainNode.gain.value=soundMuted?0:0.16;musicGainNode.connect(masterGain);
    sfxGainNode=audioCtx.createGain();sfxGainNode.gain.value=soundMuted?0:0.55;sfxGainNode.connect(masterGain);
    return true;
  }catch(e){return false;}
}

function toggleMute(){
  soundMuted=!soundMuted;
  if(musicGainNode)musicGainNode.gain.value=soundMuted?0:0.16;
  if(sfxGainNode)sfxGainNode.gain.value=soundMuted?0:0.55;
}

let _noiseBuf=null;
function getNoiseBuf(){
  if(_noiseBuf)return _noiseBuf;
  const len=Math.floor(audioCtx.sampleRate*0.5);
  _noiseBuf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=_noiseBuf.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  return _noiseBuf;
}

function _sfxOsc(dest,freq,type,t0,dur,peak,bend,fType,fFreq){
  const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,t0);
  if(bend)osc.frequency.exponentialRampToValueAtTime(bend,t0+dur);
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(peak,t0+Math.min(0.006,dur*0.1));
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  if(fType){const f=audioCtx.createBiquadFilter();f.type=fType;f.frequency.value=fFreq||1000;osc.connect(f);f.connect(g);}
  else osc.connect(g);
  g.connect(dest);osc.start(t0);osc.stop(t0+dur+0.02);
}
function _sfxNoise(dest,t0,dur,peak,fFreq,fType,q){
  const buf=getNoiseBuf();if(!buf)return;
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const flt=audioCtx.createBiquadFilter();flt.type=fType||'bandpass';flt.frequency.value=fFreq;flt.Q.value=q||1;
  const g=audioCtx.createGain();g.gain.setValueAtTime(peak,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  src.connect(flt);flt.connect(g);g.connect(dest);src.start(t0);src.stop(t0+dur+0.02);
}

function sndShoot(p){
  if(!audioCtx||!sfxGainNode)return;
  const t=audioCtx.currentTime;
  if(p.weapon==='machinegun'){
    const last=_lastMgunSfx[p.id]||0;if(t-last<0.15)return;_lastMgunSfx[p.id]=t;
    _sfxNoise(sfxGainNode,t,0.04,0.6,3000,'bandpass',3);
    _sfxOsc(sfxGainNode,240,'square',t,0.03,0.2,100);
  }else if(p.weapon==='shotgun'){
    _sfxNoise(sfxGainNode,t,0.18,1.1,900,'bandpass',0.8);
    _sfxNoise(sfxGainNode,t,0.12,0.55,300,'lowpass',0.5);
    _sfxOsc(sfxGainNode,110,'sine',t,0.12,0.4,40);
  }else{
    _sfxNoise(sfxGainNode,t,0.07,0.85,2400,'bandpass',2.5);
    _sfxOsc(sfxGainNode,160,'sine',t,0.06,0.32,52);
  }
}

function sndZombieDie(type){
  if(!audioCtx||!sfxGainNode)return;
  const t=audioCtx.currentTime;
  if(type==='bloater'){
    _sfxNoise(sfxGainNode,t,0.4,0.8,200,'lowpass',0.4);
    _sfxOsc(sfxGainNode,55,'sawtooth',t,0.35,0.42,22,'lowpass',450);
  }else if(type==='runner'){
    _sfxNoise(sfxGainNode,t,0.13,0.62,650,'bandpass',2.2);
    _sfxOsc(sfxGainNode,280,'square',t,0.11,0.26,80);
  }else if(type==='crawler'){
    _sfxNoise(sfxGainNode,t,0.09,0.42,1300,'bandpass',3);
    _sfxOsc(sfxGainNode,190,'sine',t,0.09,0.2,55);
  }else{
    _sfxNoise(sfxGainNode,t,0.2,0.72,380,'lowpass',0.9);
    _sfxOsc(sfxGainNode,110,'sawtooth',t,0.16,0.36,42,'lowpass',550);
  }
}

function sndPlayerDie(){
  if(!audioCtx||!sfxGainNode)return;
  const t=audioCtx.currentTime;
  _sfxOsc(sfxGainNode,180,'sine',t,0.9,0.6,42);
  _sfxNoise(sfxGainNode,t,0.55,0.5,200,'lowpass',0.4);
  _sfxOsc(sfxGainNode,220,'sine',t+0.35,1.1,0.28,90);
}

function sndPickup(type){
  if(!audioCtx||!sfxGainNode)return;
  const t=audioCtx.currentTime;
  if(type in POWERUPS){[600,800,1000,1200].forEach((f,i)=>_sfxOsc(sfxGainNode,f,'sine',t+i*0.04,0.13,0.32));}
  else{[400,520].forEach((f,i)=>_sfxOsc(sfxGainNode,f,'triangle',t+i*0.05,0.1,0.38));}
}

  if(!audioCtx||!sfxGainNode)return;

// ══════════════════════════════════════════════════════
//  COLLISION MATH
// ══════════════════════════════════════════════════════
function segHitsRect(ax,ay,bx,by,rx,ry,rw,rh){
  const dx=bx-ax,dy=by-ay; let tn=0,tx=1;
  for(const[p,q]of[[-dx,ax-rx],[dx,rx+rw-ax],[-dy,ay-ry],[dy,ry+rh-ay]]){
    if(Math.abs(p)<1e-9){if(q<0)return false;continue;}
    const t=q/p; if(p<0){if(t>tn)tn=t;}else{if(t<tx)tx=t;} if(tn>tx)return false;
  }
  return true;
}
function circHitsRect(cx,cy,r,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return(cx-nx)**2+(cy-ny)**2<r*r;
}
function pushOutRect(cx,cy,r,rx,ry,rw,rh){
  const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-nx,dy=cy-ny,d2=dx*dx+dy*dy;
  if(d2>=r*r)return null;
  const d=Math.sqrt(d2)||0.001;
  return{x:cx+dx/d*(r-d+0.5),y:cy+dy/d*(r-d+0.5)};
}
function inOvalWall(px,py,pad=0){
  const{cx,cy,rx,ry,t}=OVAL,dx=px-cx,dy=py-cy;
  const erx=rx+pad,ery=ry+pad,irx=rx-t-pad,iry=ry-t-pad;
  if(irx<=0||iry<=0)return(dx/erx)**2+(dy/ery)**2<=1;
  return(dx/erx)**2+(dy/ery)**2<=1&&(dx/irx)**2+(dy/iry)**2>=1;
}
function pushOutOval(px,py,r){
  const{cx,cy,rx,ry,t}=OVAL,dx=px-cx,dy=py-cy,ang=Math.atan2(dy,dx);
  const cos=Math.cos(ang),sin=Math.sin(ang),irx=rx-t,iry=ry-t;
  const ox=cx+rx*cos,oy=cy+ry*sin,ix=cx+irx*cos,iy=cy+iry*sin;
  if((px-ox)**2+(py-oy)**2<(px-ix)**2+(py-iy)**2){
    const nl=Math.hypot(cos*ry,sin*rx)||0.001;
    return{x:ox+(cos*ry/nl)*(r+1),y:oy+(sin*rx/nl)*(r+1)};
  }
  const nl=Math.hypot(cos*iry,sin*irx)||0.001;
  return{x:ix-(cos*iry/nl)*(r+1),y:iy-(sin*irx/nl)*(r+1)};
}
function inOvalInterior(px,py,pad=0){
  const{cx,cy,rx,ry,t}=OVAL,irx=rx-t-pad,iry=ry-t-pad;
  if(irx<=0||iry<=0)return false;
  const dx=px-cx,dy=py-cy;
  return(dx/irx)**2+(dy/iry)**2<1;
}
function pushOutOvalOutside(px,py,r){
  const{cx,cy,rx,ry}=OVAL;
  const ang=Math.atan2(py-cy,px-cx);
  const cos=Math.cos(ang),sin=Math.sin(ang);
  const ox=cx+rx*cos,oy=cy+ry*sin;
  const nl=Math.hypot(cos*ry,sin*rx)||0.001;
  return{x:ox+(cos*ry/nl)*(r+1),y:oy+(sin*rx/nl)*(r+1)};
}
function isBlocked(px,py,r){
  for(const w of ALL_WALLS)if(circHitsRect(px,py,r,w.x,w.y,w.w,w.h))return true;
  if(!arenaOpen&&inOvalInterior(px,py,r))return true;
  return arenaOpen?false:inOvalWall(px,py,r);
}
function resolvePos(px,py,r){
  let x=px,y=py;
  for(const w of ALL_WALLS){const res=pushOutRect(x,y,r,w.x,w.y,w.w,w.h);if(res){x=res.x;y=res.y;}}
  if(!arenaOpen){
    if(inOvalWall(x,y,r*0.4)){const res=pushOutOval(x,y,r);x=res.x;y=res.y;}
    if(inOvalInterior(x,y,r*0.4)){const res=pushOutOvalOutside(x,y,r);x=res.x;y=res.y;}
  }
  return{x,y};
}
function hasLOS(ax,ay,bx,by){
  for(const b of BLDGS)if(segHitsRect(ax,ay,bx,by,b.x,b.y,b.w,b.h))return false;
  if(!arenaOpen)for(let f=0.25;f<=0.75;f+=0.25)if(inOvalWall(ax+(bx-ax)*f,ay+(by-ay)*f))return false;
  return true;
}

function randomSpawn(r,avoid=[],minDist=0){
  let x=OVAL.cx,y=OVAL.cy,tries=0;
  do{
    const tx=WT+r+4+Math.random()*(CW-2*WT-2*r-8);
    const ty=WT+r+4+Math.random()*(CH-2*WT-2*r-8);
    if(!isBlocked(tx,ty,r)&&!inOvalWall(tx,ty,r)&&!inOvalInterior(tx,ty,r)&&avoid.every(a=>Math.hypot(a.x-tx,a.y-ty)>=minDist)){
      x=tx;y=ty;break;
    }
    tries++;
  }while(tries<700);
  return{x,y};
}

function pickZombieType(){
  const w=Z_WEIGHTS[difficulty];
  const total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<Z_KEYS.length;i++){r-=w[i];if(r<0)return Z_KEYS[i];}
  return 'walker';
}

function makeZombie(avoid){
  const type=pickZombieType();
  const zt=ZOMBIE_TYPES[type];
  const{x,y}=randomSpawn(zt.r+2,avoid,160);
  return{x,y,type,r:zt.r,hp:zt.hits,vx:0,vy:0,state:'wander',
    wanderAngle:Math.random()*Math.PI*2,wanderTimer:Math.random()*3,
    alertTimer:0,lastAng:0,speed:zt.speed*(0.85+Math.random()*0.3),
    eyePhase:Math.random()*Math.PI*2,flipX:false};
}

function makePlayer(id,charIdx,moveKeys,shootKey){

  const{x,y}=randomSpawn(PR+4,avoid,220);

    moveKeys,shootKey,x,y,dead:false,deadTimer:0,
    weapon:'pistol',ammo:WEAPONS.pistol.initAmmo,cooldown:0,
    lastAngle:0,lastVX:0,lastVY:0,shootHeld:false,effects:{speed:0,shield:0},
    arenaLivesLeft:1,arenaRevive:false};

function generatePickupSpots(){

// ══════════════════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════════════════
function moveEntity(e,dx,dy,r){
  const res=resolvePos(e.x+dx,e.y+dy,r); e.x=res.x; e.y=res.y;
}
function getAimAngle(p){
  const wep=WEAPONS[p.weapon];
  let nearest=null,minD=wep.range;
  for(const z of zombies){
    const d=Math.hypot(z.x-p.x,z.y-p.y);
    if(d<minD&&hasLOS(p.x,p.y,z.x,z.y)){minD=d;nearest=z;}
  }
  if(bossZombie){
    const d=Math.hypot(bossZombie.x-p.x,bossZombie.y-p.y);
    if(d<minD&&hasLOS(p.x,p.y,bossZombie.x,bossZombie.y)){nearest=bossZombie;}
  }
  return nearest?Math.atan2(nearest.y-p.y,nearest.x-p.x):p.lastAngle;
}
function fireBullet(p){
  const wep=WEAPONS[p.weapon];
  if(p.ammo<=0||p.cooldown>0) return;
  const aim=getAimAngle(p);
  for(let i=0;i<wep.pellets;i++){
    const ang=aim+(Math.random()-0.5)*wep.spread;
    bullets.push({x:p.x,y:p.y,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,range:wep.range,traveled:0,col:wep.bcol});
  }
  p.ammo--; p.cooldown=wep.rate;
  sndShoot(p);
}
function updatePlayers(dt){
  for(const p of players){
    if(p.dead){
      p.deadTimer+=dt;
      if(p.arenaRevive&&p.deadTimer>2.5){
        p.dead=false; p.arenaRevive=false; p.deadTimer=0;
        p.x=OVAL.cx+(Math.random()-.5)*30; p.y=OVAL.cy+(Math.random()-.5)*20;
        p.effects.shield=2.5;
        flash('P'+p.id+' REVIVED!');
      }
      continue;
    }
    if(p.cooldown>0) p.cooldown-=dt;
    if(p.effects.speed>0) p.effects.speed-=dt;
    if(p.effects.shield>0) p.effects.shield-=dt;
    let dx=0,dy=0;
    if(KEYS[p.moveKeys.up])    dy-=P_SPD;
    if(KEYS[p.moveKeys.down])  dy+=P_SPD;
    if(KEYS[p.moveKeys.left])  dx-=P_SPD;
    if(KEYS[p.moveKeys.right]) dx+=P_SPD;
    if(dx&&dy){dx*=0.7071;dy*=0.7071;}
    const boost=p.effects.speed>0?1.85:1;
    if(dx||dy){
      moveEntity(p,dx*boost,dy*boost,PR);
      p.lastAngle=Math.atan2(dy,dx);
      p.lastVX=dx; p.lastVY=dy;
    }
    const held=!!KEYS[p.shootKey];
    if(held&&(WEAPONS[p.weapon].auto||!p.shootHeld)) fireBullet(p);
    p.shootHeld=held;
  }
}
function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx; b.y+=b.vy;
    b.traveled+=Math.hypot(b.vx,b.vy);
    if(b.traveled>=b.range||b.x<0||b.x>CW||b.y<0||b.y>CH){bullets.splice(i,1);continue;}
    if(isBlocked(b.x,b.y,2)){spawnSpark(b.x,b.y,b.col);bullets.splice(i,1);}
  }
}
function updateZombies(dt){
  const d=DIFF[difficulty];
  const tMult=d.zMult*(1+Math.min(surviveTime/200,0.5)*d.scaleMult)*(1+(currentRound-1)*0.1);
  if(globalFreeze>0){globalFreeze-=dt;return;}
  for(const z of zombies){
    const zt=ZOMBIE_TYPES[z.type];
    let target=null,best=Infinity;
    for(const p of players){
      if(p.dead) continue;
      const dist=Math.hypot(p.x-z.x,p.y-z.y);
      if((dist<zt.hear||(dist<zt.sight&&hasLOS(z.x,z.y,p.x,p.y)))&&dist<best){best=dist;target=p;}
    }
    if(target){
      const ang=Math.atan2(target.y-z.y,target.x-z.x);
      const spd=(best<zt.hear?zt.chase:z.speed)*tMult;
      z.vx=Math.cos(ang)*spd; z.vy=Math.sin(ang)*spd;
      z.state='chase'; z.alertTimer=5.5; z.lastAng=ang;
    } else if(z.alertTimer>0){
      z.alertTimer-=dt;
      z.vx=Math.cos(z.lastAng)*z.speed*0.6*tMult;
      z.vy=Math.sin(z.lastAng)*z.speed*0.6*tMult;
      z.state='alert';
    } else {
      z.state='wander'; z.wanderTimer-=dt;
      if(z.wanderTimer<=0){z.wanderAngle+=(Math.random()-0.5)*1.9;z.wanderTimer=1.4+Math.random()*2.8;}
      z.vx=Math.cos(z.wanderAngle)*z.speed*0.38*tMult;
      z.vy=Math.sin(z.wanderAngle)*z.speed*0.38*tMult;
    }
    if(z.vx<-0.05)z.flipX=true; else if(z.vx>0.05)z.flipX=false;
    moveEntity(z,z.vx,z.vy,z.r);
    z.eyePhase+=dt*3;
  }
}
function updatePickups(dt){
  for(const pk of pickups){
    pk.pulse+=dt*2.8;
    if(!pk.active){pk.respawn-=dt;if(pk.respawn<=0)pk.active=true;}
  }
}
function applyPickup(p,pk){
  switch(pk.type){
    case 'pistol':
      if(p.weapon!=='pistol'){p.weapon='pistol';p.ammo=WEAPONS.pistol.initAmmo;p.cooldown=0;}
      else p.ammo=Math.min(p.ammo+10,WEAPONS.pistol.maxAmmo);
      flash(`${p.label} PISTOL +AMMO`); break;
    case 'shotgun':
      p.weapon='shotgun';p.ammo=WEAPONS.shotgun.initAmmo;p.cooldown=0;
      flash(`${p.label} SHOTGUN!`); break;
    case 'machinegun':
      p.weapon='machinegun';p.ammo=WEAPONS.machinegun.initAmmo;p.cooldown=0;
      flash(`${p.label} M-GUN!`); break;
    case 'speed':  p.effects.speed=POWERUPS.speed.dur;   flash(`${p.label} ⚡ SPEED!`); break;
    case 'shield': p.effects.shield=POWERUPS.shield.dur; flash(`${p.label} ◈ SHIELD!`); break;
    case 'freeze': globalFreeze=POWERUPS.freeze.dur;     flash('❄ ALL FROZEN!'); break;
  }
}
function flash(msg){waveText=msg;waveTimer=1.8;}

// Particles
function spawnBlood(x,y){
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=1.2+Math.random()*3.5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*3.5,life:1,col:Math.random()<0.6?'#9b0000':'#c00010'});}
}
function spawnSpark(x,y,col){
  for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1+Math.random()*1.5,life:0.5,col});}
}
function spawnZombieKill(x,y,type){
  const isBltr=type==='bloater';
  for(let i=0;i<(isBltr?20:12);i++){
    const a=Math.random()*Math.PI*2,s=0.8+Math.random()*(isBltr?5:3);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.5+Math.random()*(isBltr?5:3),life:0.9,col:i<7?'#1a2a0a':'#2a5010'});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.89;p.vy*=0.89;p.life-=dt*0.8;
    if(p.life<=0)particles.splice(i,1);
  }
}
function updateBoss(dt){
  if(!bossZombie)return;
  const z=bossZombie;
  const d=DIFF[difficulty];
  const spd=BOSS.chase*d.zMult*(1+(currentRound-1)*0.1);
  let target=null,best=Infinity;
  for(const p of players){
    if(p.dead)continue;
    const dist=Math.hypot(p.x-z.x,p.y-z.y);
    if(dist<best){best=dist;target=p;}
  }
  if(target){
    const ang=Math.atan2(target.y-z.y,target.x-z.x);
    z.vx=Math.cos(ang)*spd; z.vy=Math.sin(ang)*spd; z.lastAng=ang;
  } else {
    z.wanderTimer-=dt;
    if(z.wanderTimer<=0){z.wanderAngle+=(Math.random()-.5)*1.8;z.wanderTimer=1.5+Math.random()*2;}
    z.vx=Math.cos(z.wanderAngle)*BOSS.speed; z.vy=Math.sin(z.wanderAngle)*BOSS.speed;
  }
  // Constrain boss to oval interior
  let nx=z.x+z.vx, ny=z.y+z.vy;
  if(!inOvalInterior(nx,ny,z.r+2)){
    const ang=Math.atan2(OVAL.cy-z.y,OVAL.cx-z.x);
    nx=z.x+Math.cos(ang)*BOSS.speed*0.5; ny=z.y+Math.sin(ang)*BOSS.speed*0.5;
    if(!inOvalInterior(nx,ny,z.r+2)){nx=z.x;ny=z.y;}
  }
  z.x=nx; z.y=ny; z.eyePhase+=dt*3;
  if(z.vx<-0.05)z.flipX=true; else if(z.vx>0.05)z.flipX=false;
}
function checkCollisions(){
  const thr=ARENA_KILLS[difficulty];
  outer:for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    // Boss hit
    if(bossZombie&&Math.hypot(b.x-bossZombie.x,b.y-bossZombie.y)<bossZombie.r+3){
      bossZombie.hp--;
      if(bossZombie.hp<=0){
        spawnZombieKill(bossZombie.x,bossZombie.y,'bloater');
        spawnZombieKill(bossZombie.x,bossZombie.y,'bloater');
        bossZombie=null;
        sndBossDie();sndRoundClear();
        currentRound++;
        roundClearTimer=4.5;
        gameState='roundclear';
      } else {
        spawnSpark(b.x,b.y,'#ff6600');
        spawnSpark(b.x,b.y,'#ff3300');
      }
      bullets.splice(bi,1);continue outer;
    }
    for(let zi=zombies.length-1;zi>=0;zi--){
      const z=zombies[zi];
      if(Math.hypot(b.x-z.x,b.y-z.y)<z.r+3){
        z.hp--;
        if(z.hp<=0){
          zombieKills++;
          if(!arenaOpen&&zombieKills>=thr){arenaOpen=true;flash('ARENA OPEN — ENTER NOW!');sndArenaOpen();}
          spawnZombieKill(z.x,z.y,z.type);sndZombieDie(z.type);zombies.splice(zi,1);
        } else spawnSpark(b.x,b.y,'#ff9900');
        bullets.splice(bi,1);continue outer;
      }
    }
  }
  // Spawn boss when arena just opened and boss not yet spawned
  if(arenaOpen&&!bossSpawned) spawnBoss();
  for(const p of players){
    if(p.dead||p.effects.shield>0) continue;
    for(const z of zombies){
      if(Math.hypot(p.x-z.x,p.y-z.y)<PR+z.r-2){
        if(arenaOpen&&inOvalInterior(p.x,p.y,0)&&p.arenaLivesLeft>0){
          p.dead=true; p.arenaRevive=true; p.arenaLivesLeft--; p.deadTimer=0;
          spawnBlood(p.x,p.y); flash('P'+p.id+' — ARENA LIFE!'); sndPlayerDie();
        } else {
          p.dead=true; spawnBlood(p.x,p.y); sndPlayerDie();
        }
        break;
      }
    }
    // Boss contact
    if(!p.dead&&bossZombie&&Math.hypot(p.x-bossZombie.x,p.y-bossZombie.y)<PR+bossZombie.r-2){
      if(arenaOpen&&inOvalInterior(p.x,p.y,0)&&p.arenaLivesLeft>0){
        p.dead=true; p.arenaRevive=true; p.arenaLivesLeft--; p.deadTimer=0;
        spawnBlood(p.x,p.y); flash('P'+p.id+' — ARENA LIFE!'); sndPlayerDie();
      } else {
        p.dead=true; spawnBlood(p.x,p.y); sndPlayerDie();
      }
    }
  }
  for(const p of players){
    if(p.dead) continue;
    for(const pk of pickups){
      if(!pk.active) continue;
      if(Math.hypot(p.x-pk.x,p.y-pk.y)<PR+14){applyPickup(p,pk);sndPickup(pk.type);pk.active=false;pk.respawn=22;}
    }
  }
  if(players.length&&players.every(p=>p.dead)&&!players.some(p=>p.arenaRevive)){
    finalTime=surviveTime;
    scores.unshift(Math.round(finalTime*10)/10);
    if(scores.length>5)scores.length=5;
    localStorage.setItem('dz_hi',JSON.stringify(scores));
    gameState='gameover'; sndGameOver();
  }
}

function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function fmtTime(s){return`${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;}

function drawSprite(key,x,y,size,alpha=1,flipX=false){
  const img=IMGS[key];
  if(!img||!img.complete||!img.naturalWidth){
    ctx.beginPath();ctx.arc(x,y,size/2,0,Math.PI*2);
    ctx.fillStyle='#555';ctx.fill();return;
  }
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.translate(x,y);
  if(flipX)ctx.scale(-1,1);
  ctx.drawImage(img,-size/2,-size/2,size,size);
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawGround(){ctx.drawImage(groundOC,0,0);}

function drawBuildings(){
  ctx.fillStyle='rgba(0,0,0,0.32)';
  for(const b of BLDGS)ctx.fillRect(b.x+5,b.y+6,b.w,b.h);
  for(const b of BLDGS){
    ctx.fillStyle='#20241a';ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.save();ctx.beginPath();ctx.rect(b.x,b.y,b.w,b.h);ctx.clip();
    ctx.strokeStyle='rgba(255,255,200,0.04)';ctx.lineWidth=1;
    for(let d=-b.h;d<b.w+b.h;d+=12){ctx.beginPath();ctx.moveTo(b.x+d,b.y);ctx.lineTo(b.x+d+b.h,b.y+b.h);ctx.stroke();}
    ctx.restore();
    ctx.fillStyle='#2e3324';ctx.fillRect(b.x,b.y,b.w,3);ctx.fillRect(b.x,b.y,3,b.h);
    ctx.fillStyle='#141710';ctx.fillRect(b.x,b.y+b.h-3,b.w,3);ctx.fillRect(b.x+b.w-3,b.y,3,b.h);
  }
}

function drawOvalRing(){
  const{cx,cy,rx,ry,t}=OVAL,irx=rx-t,iry=ry-t;
  ctx.save();ctx.translate(5,6);ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2,false);ctx.ellipse(cx,cy,irx,iry,0,0,Math.PI*2,true);ctx.fill();
  ctx.restore();
  // Interior floor — warmer color when open
  ctx.fillStyle=arenaOpen?'#221a10':'#151810';
  ctx.beginPath();ctx.ellipse(cx,cy,irx,iry,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1c2014';ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2,false);ctx.ellipse(cx,cy,irx,iry,0,0,Math.PI*2,true);ctx.fill();
  ctx.save();ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2,false);ctx.ellipse(cx,cy,irx,iry,0,0,Math.PI*2,true);ctx.clip();
  ctx.strokeStyle='rgba(255,255,180,0.04)';ctx.lineWidth=1;
  for(let d=cx-rx-ry;d<cx+rx+ry;d+=14){ctx.beginPath();ctx.moveTo(d-ry,cy-ry);ctx.lineTo(d+ry,cy+ry);ctx.stroke();}
  ctx.restore();
  ctx.strokeStyle=arenaOpen?'#5a4a1a':'#30362a';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='#121510';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(cx,cy,irx,iry,0,0,Math.PI*2);ctx.stroke();
  // Entrance gaps (paint ground texture over ring wall at top & bottom)
  if(arenaOpen){
    const gw=32;
    ctx.drawImage(groundOC,cx-gw/2,cy-ry-1,gw,t+4,cx-gw/2,cy-ry-1,gw,t+4);
    ctx.drawImage(groundOC,cx-gw/2,cy+iry-3,gw,t+4,cx-gw/2,cy+iry-3,gw,t+4);
    // Entry arrows
    const pulse=0.65+0.35*Math.sin(Date.now()/250);
    ctx.fillStyle=`rgba(220,170,30,${pulse})`;ctx.font='bold 12px Courier New';ctx.textAlign='center';
    ctx.fillText('▼',cx,cy-iry+14);
    ctx.fillText('▲',cx,cy+iry-3);
  }
  // Arena state overlay (only during gameplay)
  if(gameState==='playing'||gameState==='roundclear'){
    if(!arenaOpen){
      const thr=ARENA_KILLS[difficulty],prog=Math.min(zombieKills/thr,1);
      ctx.fillStyle='rgba(180,40,20,0.75)';ctx.font='bold 10px Courier New';ctx.textAlign='center';
      ctx.fillText('LOCKED',cx,cy-7);
      ctx.fillStyle='#553322';ctx.font='9px Courier New';
      ctx.fillText(zombieKills+'/'+thr+' kills',cx,cy+7);
      ctx.fillStyle='#2a0e00';ctx.fillRect(cx-28,cy+12,56,5);
      ctx.fillStyle='#cc4010';ctx.fillRect(cx-28,cy+12,Math.round(56*prog),5);
    } else if(bossZombie){
      // Boss HP bar on ring interior edge
      const prog=bossZombie.hp/BOSS.hits;
      ctx.fillStyle='rgba(180,0,0,0.55)';ctx.font='bold 9px Courier New';ctx.textAlign='center';
      ctx.fillText('BOSS  HP',cx,cy+iry-16);
      ctx.fillStyle='#3a0000';ctx.fillRect(cx-32,cy+iry-12,64,6);
      ctx.fillStyle='#ee2200';ctx.fillRect(cx-32,cy+iry-12,Math.round(64*prog),6);
    }
  }
}

function drawOuterWalls(){
  for(const w of OUTER){ctx.fillStyle='#141810';ctx.fillRect(w.x,w.y,w.w,w.h);}
  ctx.strokeStyle='#2a3018';ctx.lineWidth=3;ctx.strokeRect(WT,WT,CW-2*WT,CH-2*WT);
  ctx.fillStyle='#1e2416';const cs=WT+4;
  [[0,0],[CW-cs,0],[0,CH-cs],[CW-cs,CH-cs]].forEach(([x,y])=>ctx.fillRect(x,y,cs,cs));
}

function drawPickups(){
  for(const pk of pickups){
    if(!pk.active)continue;
    const pulse=0.7+0.3*Math.sin(pk.pulse),r=10+3*Math.sin(pk.pulse*0.7);
    const isWep=pk.type in WEAPONS;
    const col=isWep?WEAPONS[pk.type].col:POWERUPS[pk.type].col;
    const icon=isWep?(pk.type==='pistol'?'P':pk.type==='shotgun'?'S':'M'):POWERUPS[pk.type].icon;
    const label=isWep?WEAPONS[pk.type].label:POWERUPS[pk.type].label;
    const grd=ctx.createRadialGradient(pk.x,pk.y,r-2,pk.x,pk.y,r+10);
    grd.addColorStop(0,col+'70');grd.addColorStop(1,col+'00');
    ctx.beginPath();ctx.arc(pk.x,pk.y,r+10,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    ctx.beginPath();ctx.arc(pk.x,pk.y,r,0,Math.PI*2);ctx.fillStyle=col+(isWep?'cc':'aa');ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,'+pulse+')';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.font=`bold ${isWep?10:13}px Courier New`;ctx.fillText(icon,pk.x,pk.y+4);
    ctx.fillStyle=col;ctx.font='bold 7px Courier New';ctx.fillText(label,pk.x,pk.y+r+10);
  }
}

function drawBullets(){
  for(const b of bullets){
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fillStyle=b.col;ctx.fill();
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*2.5,b.y-b.vy*2.5);
    ctx.strokeStyle=b.col+'88';ctx.lineWidth=2;ctx.stroke();
  }
}

function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawZombies(){
  const frozen=globalFreeze>0;
  for(const z of zombies){
    const zt=ZOMBIE_TYPES[z.type];
    const chase=z.state==='chase', sz=zt.size;
    // Frozen aura
    if(frozen){
      ctx.beginPath();ctx.arc(z.x,z.y,z.r+6,0,Math.PI*2);
      ctx.fillStyle='rgba(144,224,239,0.22)';ctx.fill();
    }
    // Shadow
    ctx.save();ctx.translate(z.x+3,z.y+5);ctx.scale(1,0.35);
    ctx.beginPath();ctx.arc(0,0,z.r*0.9,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.32)';ctx.fill();ctx.restore();
    // Sprite
    drawSprite(z.type,z.x,z.y,sz,frozen?0.55:1,z.flipX);
    // Chase glow ring
    if(chase&&!frozen){
      const glowCol=z.type==='runner'?'rgba(220,60,60,0.55)':z.type==='bloater'?'rgba(110,220,40,0.5)':z.type==='crawler'?'rgba(80,80,220,0.45)':'rgba(90,210,30,0.5)';
      ctx.beginPath();ctx.arc(z.x,z.y,z.r+3,0,Math.PI*2);
      ctx.strokeStyle=glowCol;ctx.lineWidth=2;ctx.stroke();
    }
    // Frozen icon
    if(frozen){
      ctx.fillStyle='rgba(144,224,239,0.9)';ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText('❄',z.x,z.y+3.5);
    }
    // Bloater HP pips
    if(z.type==='bloater'){
      const maxHp=ZOMBIE_TYPES.bloater.hits;
      for(let i=0;i<maxHp;i++){
        ctx.fillStyle=i<z.hp?'#88ee44':'#2a2a2a';
        ctx.fillRect(z.x-9+i*11,z.y-sz/2-8,9,4);
      }
    }
  }
}

function drawPlayers(){
  const sz=38;
  for(const p of players){
    if(p.dead){
      ctx.globalAlpha=Math.max(0.1,0.55-p.deadTimer*0.09);
      drawSprite(p.spriteKey,p.x,p.y,sz);
      ctx.globalAlpha=1;
      ctx.strokeStyle='#ff3333';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(p.x-9,p.y-9);ctx.lineTo(p.x+9,p.y+9);
      ctx.moveTo(p.x+9,p.y-9);ctx.lineTo(p.x-9,p.y+9);ctx.stroke();
      ctx.fillStyle='#ff4444';ctx.font='bold 9px Courier New';ctx.textAlign='center';
      ctx.fillText('DEAD',p.x,p.y-24);
      continue;
    }
    // Speed aura
    if(p.effects.speed>0){
      const sg=ctx.createRadialGradient(p.x,p.y,PR,p.x,p.y,PR+18);
      sg.addColorStop(0,'rgba(0,212,255,0.38)');sg.addColorStop(1,'rgba(0,212,255,0)');
      ctx.beginPath();ctx.arc(p.x,p.y,PR+18,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
    }
    // Shield bubble
    if(p.effects.shield>0){
      const sp=0.7+0.3*Math.sin(Date.now()/140);
      ctx.beginPath();ctx.arc(p.x,p.y,PR+10+sp*3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,144,255,${0.55+sp*0.35})`;ctx.lineWidth=2.5;ctx.stroke();
      ctx.fillStyle='rgba(100,144,255,0.09)';ctx.fill();
    }
    // Color glow ring
    const grd=ctx.createRadialGradient(p.x,p.y,PR,p.x,p.y,PR+14);
    grd.addColorStop(0,p.color+'45');grd.addColorStop(1,p.color+'00');
    ctx.beginPath();ctx.arc(p.x,p.y,PR+14,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    // Shadow
    ctx.save();ctx.translate(p.x+3,p.y+6);ctx.scale(1,0.32);
    ctx.beginPath();ctx.arc(0,0,PR*0.85,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();ctx.restore();
    // Sprite (flip when moving left)
    drawSprite(p.spriteKey,p.x,p.y,sz,1,p.lastVX<-0.05);
    // Color-coded name tag
    ctx.fillStyle=p.color;ctx.font='bold 8px Courier New';ctx.textAlign='center';
    ctx.fillText('P'+p.id+' '+p.label,p.x,p.y-sz/2-6);
  }
}

function drawBoss(){
  if(!bossZombie)return;
  const z=bossZombie,pulse=0.7+0.3*Math.sin(z.eyePhase*2.2);
  // Outer glow
  const grd=ctx.createRadialGradient(z.x,z.y,z.r,z.x,z.y,z.r+22);
  grd.addColorStop(0,`rgba(220,50,10,${0.45*pulse})`);grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(z.x,z.y,z.r+22,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  // Shadow
  ctx.save();ctx.translate(z.x+5,z.y+9);ctx.scale(1,0.3);
  ctx.beginPath();ctx.arc(0,0,z.r,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fill();ctx.restore();
  // Body
  const bg=ctx.createRadialGradient(z.x-z.r*0.3,z.y-z.r*0.3,3,z.x,z.y,z.r);
  bg.addColorStop(0,'#8b1a1a');bg.addColorStop(1,'#380800');
  ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle=`rgba(220,60,10,${0.6+0.4*pulse})`;ctx.lineWidth=3;ctx.stroke();
  // Eyes
  for(const off of[-0.45,0.45]){
    const ex=z.x+Math.cos(z.lastAng+off)*z.r*0.4,ey=z.y+Math.sin(z.lastAng+off)*z.r*0.4;
    ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,200,0,${pulse})`;ctx.fill();
  }
  // HP bar
  const bprog=z.hp/BOSS.hits,bw=64,bx=z.x-bw/2,by=z.y-z.r-16;
  ctx.fillStyle='#2a0000';ctx.fillRect(bx,by,bw,7);
  ctx.fillStyle=bprog>0.5?'#cc2200':'#ff1100';ctx.fillRect(bx,by,Math.round(bw*bprog),7);
  ctx.strokeStyle='#550000';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,7);
  ctx.fillStyle=`rgba(255,80,40,${pulse})`;ctx.font='bold 9px Courier New';ctx.textAlign='center';
  ctx.fillText('BOSS',z.x,by-4);
}

  ctx.fillStyle=PLAYER_COLORS[0];ctx.font='bold 12px Courier New';ctx.textAlign='left';
  ctx.fillText('P1  W A S D · F = shoot',CW/2-196,CH/2+27);
  ctx.fillStyle=PLAYER_COLORS[1];
  ctx.fillText('P2  ↑ ← ↓ → · / = shoot',CW/2-196,CH/2+43);
  ctx.fillStyle='#cccccc';ctx.font='11px Courier New';
  ctx.fillText('Walk over glowing orbs to collect weapons & power-ups',CW/2-196,CH/2+57);

  // ── DIFFICULTY ──
  ctx.fillStyle='#cccccc';ctx.font='bold 12px Courier New';ctx.textAlign='center';
  ctx.fillText('DIFFICULTY  · keys  1  2  3  4',CW/2,CH/2+80);
  const btnW=108,gap=8,totalW=(btnW+gap)*4-gap,sx=CW/2-totalW/2,btnY=CH/2+86;
  DIFF_KEYS.forEach((k,i)=>{
    const bx=sx+i*(btnW+gap),d=DIFF[k],sel=difficulty===k;
    ctx.fillStyle=sel?d.col+'44':'rgba(0,0,0,0.55)';rrect(bx,btnY,btnW,30,6);ctx.fill();
    ctx.strokeStyle=sel?d.col:'#2a2a2a';ctx.lineWidth=sel?2.5:1;ctx.stroke();
    ctx.fillStyle=sel?d.col:'#aaaaaa';
    ctx.font=`${sel?'bold ':''}13px Courier New`;ctx.textAlign='center';
    ctx.fillText(d.label,bx+btnW/2,btnY+20);
  });

  // ── ENEMY TYPE LEGEND ──
  const ly=CH/2+136, zx0=CW/2-3*48;
  ctx.fillStyle='#999999';ctx.font='bold 11px Courier New';ctx.textAlign='center';
  ctx.fillText('ENEMY TYPES',CW/2,ly);
  Z_KEYS.forEach((key,i)=>{
    const zt=ZOMBIE_TYPES[key],cx2=zx0+i*96;
    drawSprite(key,cx2,ly+20,24);
    ctx.fillStyle='#aaaaaa';ctx.font='10px Courier New';ctx.textAlign='center';
    ctx.fillText(zt.label,cx2,ly+38);
    if(key==='bloater'){
      ctx.fillStyle='#88ee44';ctx.font='9px Courier New';
      ctx.fillText('2 HIT',cx2,ly+50);
    }
  });

  // ── BLINK START ──
  if(Math.floor(Date.now()/550)%2===0){
    ctx.fillStyle='#8bc34a';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('PRESS  SPACE  TO  START',CW/2,CH/2+192);
  }

  // ── HIGH SCORES ──
  if(scores.length>0){
    ctx.fillStyle='#999999';ctx.font='12px Courier New';ctx.textAlign='center';
    ctx.fillText('BEST RUNS',CW/2,CH/2+212);
    scores.slice(0,3).forEach((s,i)=>{
      ctx.fillStyle=i===0?'#7ab828':'#888888';
      ctx.font=`${i===0?'bold ':''}12px Courier New`;
      ctx.fillText(`${i+1}. ${fmtTime(s)}`,CW/2,CH/2+228+i*16);
    });
  }
}

// ══════════════════════════════════════════════════════
//  GAME OVER
// ══════════════════════════════════════════════════════
function drawGameOver(){
  ctx.fillStyle='rgba(4,5,3,0.88)';ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#e5404a';ctx.font='bold 60px Courier New';ctx.textAlign='center';
  ctx.fillText('YOU DIED',CW/2,CH/2-112);
  ctx.fillStyle='#7ab828';ctx.font='bold 24px Courier New';
  ctx.fillText('SURVIVED: '+fmtTime(finalTime),CW/2,CH/2-62);
  const m=ALL_MAPS[selectedMapIdx];
  ctx.fillStyle='#4a5e38';ctx.font='11px Courier New';
  ctx.fillText('on '+m.name,CW/2,CH/2-42);
  const d=DIFF[difficulty];
  ctx.fillStyle=d.col+'cc';ctx.font='bold 11px Courier New';
  ctx.fillText('[ '+d.label+' ]',CW/2,CH/2-22);
  if(scores[0]&&Math.abs(finalTime-scores[0])<0.5){
    ctx.fillStyle='#f4c430';ctx.font='bold 13px Courier New';
    ctx.fillText('★  NEW  BEST  ★',CW/2,CH/2-2);
  }
  // Character portraits of fallen players
  players.forEach((p,i)=>{
    const px=CW/2-50+i*100;
    drawSprite(p.spriteKey,px,CH/2+30,34,0.7);
    ctx.fillStyle=p.color;ctx.font='bold 8px Courier New';ctx.textAlign='center';
    ctx.fillText(p.label,px,CH/2+54);
  });
  ctx.fillStyle='#3e3e3e';ctx.font='10px Courier New';ctx.textAlign='center';
  ctx.fillText('TOP RUNS',CW/2,CH/2+72);
  scores.slice(0,4).forEach((s,i)=>{
    ctx.fillStyle=i===0?'#7ab828':'#3e3e3e';
    ctx.font=`${i===0?'bold ':''}11px Courier New`;
    ctx.fillText(`${i+1}. ${fmtTime(s)}`,CW/2,CH/2+88+i*18);
  });
  if(Math.floor(Date.now()/550)%2===0){
    ctx.fillStyle='#aaa';ctx.font='bold 17px Courier New';
    ctx.fillText('PRESS  SPACE  TO  PLAY  AGAIN',CW/2,CH/2+168);
  }
}

// ══════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════
let lastTS=0;
function loop(ts){
  const dt=Math.min((ts-lastTS)/1000,0.05);lastTS=ts;

  if((gameState==='menu'||gameState==='gameover')&&KEYS['Space']) startGame();

  if(gameState==='playing'&&!settingsOpen){
    surviveTime+=dt;if(waveTimer>0)waveTimer-=dt;
    updatePlayers(dt);updateBullets();updateZombies(dt);updateBoss(dt);
    updatePickups(dt);checkCollisions();updateParticles(dt);
  } else if(gameState==='roundclear'&&!settingsOpen){
    roundClearTimer-=dt;
    if(roundClearTimer<=0)startNextRound();
  } else if(gameState==='menu'){
    const dt2=Math.min(dt,0.03);
    for(const z of zombies){
      z.wanderTimer-=dt2;
      if(z.wanderTimer<=0){z.wanderAngle+=(Math.random()-.5)*1.8;z.wanderTimer=1.5+Math.random()*2.5;}
      const zt=ZOMBIE_TYPES[z.type];
      const vx=Math.cos(z.wanderAngle)*zt.speed*0.38;
      const vy=Math.sin(z.wanderAngle)*zt.speed*0.38;
      if(vx<-0.05)z.flipX=true; else if(vx>0.05)z.flipX=false;
      moveEntity(z,vx,vy,z.r);
    }
  }

  drawGround();drawOuterWalls();drawBuildings();drawOvalRing();

  // Loading screen
  if(!allImgsLoaded()){
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#4a7a14';ctx.font='bold 22px Courier New';ctx.textAlign='center';
    ctx.fillText('DEAD ZONE',CW/2,CH/2-20);
    ctx.fillStyle='#7ab828';ctx.font='13px Courier New';
    ctx.fillText(`Loading assets  ${imgsReady} / ${imgTotal}`,CW/2,CH/2+10);
    requestAnimationFrame(loop);return;
  }

  if(gameState!=='menu'){
    drawPickups();drawParticles();drawBullets();drawZombies();drawBoss();drawPlayers();
  } else {
    drawZombies();
  }
  drawVignette();
  if(gameState==='playing')    drawHUD();
  if(gameState==='roundclear'){drawHUD();drawRoundClear();}
  if(gameState==='menu')       drawMenuOverlay();
  if(gameState==='gameover')  {drawHUD();drawGameOver();}
  // Settings button + overlay always rendered last (on top)
  drawSettingsBtn();
  if(settingsOpen) drawSettingsOverlay();

  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
(function boot(){
  applyMap(0);
  players=[];
  zombies=Array.from({length:40},()=>{
    const type=Z_KEYS[Math.floor(Math.random()*4)];
    const zt=ZOMBIE_TYPES[type];
    const{x,y}=randomSpawn(zt.r+2,[],80);
    return{x,y,type,r:zt.r,hp:zt.hits,vx:0,vy:0,state:'wander',
      wanderAngle:Math.random()*Math.PI*2,wanderTimer:Math.random()*3,
      alertTimer:0,lastAng:0,speed:zt.speed,eyePhase:0,flipX:false};
  });
})();
requestAnimationFrame(loop);
</script>
